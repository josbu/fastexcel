# ---------------------------------------------------------------------------
# JUnit Platform configuration for the fesod-sheet test suite.
#
# Lifecycle: PER_CLASS lets @ArgumentsSource providers and @BeforeAll/@AfterAll
# setup methods be non-static, and allows expensive per-class state to be shared
# across parameterized invocations of the same test instance.
# ---------------------------------------------------------------------------
junit.jupiter.testinstance.lifecycle.default = per_class

# ---------------------------------------------------------------------------
# Parallel execution: enabled at the platform level but the DEFAULT modes are
# same_thread, so the build remains serial and deterministic unless a class (or
# the parallel-tests profile) explicitly opts into concurrency via
# @Execution(ExecutionMode.CONCURRENT).
# ---------------------------------------------------------------------------
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = same_thread
junit.jupiter.execution.parallel.mode.classes.default = same_thread
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 1

# ---------------------------------------------------------------------------
# Replace camelCase/underscore test method names with human-readable display
# names in test reports (e.g. readAndWrite -> "read And Write").
# ---------------------------------------------------------------------------
junit.jupiter.displayname.generator.default = \
  org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores
